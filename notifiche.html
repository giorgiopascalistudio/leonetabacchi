<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Turni — Notifiche</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebar-mount"></div>
  <main class="main-area" id="main"></main>
</div>
<!-- App core (classic script, defines globals) -->
<script src="app.js"></script>
<!-- Firebase (ES module, imports SDK v12 and exports to window.*) -->
<script type="module" src="firebase.js"></script>
<script>
const user=requireAuth();if(!user)throw 0;
document.getElementById('sidebar-mount').innerHTML=buildSidebar('notifiche',user);
const isOwner=user.role==='owner';
const myEmp=isOwner?null:UID_TO_EMP[user.uid];

function render(){
  let h=`<div class="page-title">Notifiche</div>`;

  if(isOwner){
    const pSwap=swapStore.filter(r=>r.status==='pending');
    const pCover=coverStore.filter(r=>r.status==='pending');
    const total=pSwap.length+pCover.length;
    h+=`<div class="page-sub">${total} richiesta/e in attesa di risposta</div>`;

    if(!total){
      h+=`<div class="notice notice-ok"><div class="notice-dot"></div>Tutto in ordine, nessuna richiesta pendente.</div>`;
    }

    if(pSwap.length){
      h+=`<div class="sh"><span class="sh-title">Cambi turno in attesa (${pSwap.length})</span></div>`;
      pSwap.forEach(r=>{
        const ws=weekStart(r.weekOffset);
        h+=`<div class="notif-item"><div class="notif-dot"></div>
          <div class="notif-body">
            <div class="notif-title">${r.fromEmp} — cambio turno ${DAYS[r.fromDay]} ${SN[r.fromShift]} ↔ ${DAYS[r.wantDay]} ${SN[r.wantShift]}</div>
            <div style="font-size:0.78rem;color:var(--text2)">Con: ${r.targetColleagues.join(', ')} · Sett. ${fmt3(ws)}</div>
            <div class="notif-time">${new Date(r.createdAt).toLocaleString('it-IT')}</div>
          </div>
          <a href="cambi.html" class="btn btn-ghost btn-sm">Vai →</a>
        </div>`;
      });
    }
    if(pCover.length){
      h+=`<div class="sh"><span class="sh-title">Coperture in attesa (${pCover.length})</span></div>`;
      pCover.forEach(r=>{
        const ws=weekStart(r.weekOffset);
        h+=`<div class="notif-item"><div class="notif-dot"></div>
          <div class="notif-body">
            <div class="notif-title">${r.fromEmp} — copertura ${DAYS[r.dayIdx]} ${SN[r.myShift]}</div>
            <div style="font-size:0.78rem;color:var(--text2)">Con: ${r.targetColleagues.join(', ')} · Sett. ${fmt3(ws)}</div>
            <div class="notif-time">${new Date(r.createdAt).toLocaleString('it-IT')}</div>
          </div>
          <a href="coperture.html" class="btn btn-ghost btn-sm">Vai →</a>
        </div>`;
      });
    }

    // Preferenze impostate
    const withPrefs=EMPLOYEES.filter(e=>prefsStore[EMP_TO_UID[e]]?.dates?.length);
    if(withPrefs.length){
      const todayStr=`${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}-${String(new Date().getDate()).padStart(2,'0')}`;
      h+=`<div class="sh" style="margin-top:0.75rem"><span class="sh-title">Preferenze giorni liberi impostate</span></div>`;
      withPrefs.forEach(emp=>{
        const pref=prefsStore[EMP_TO_UID[emp]];
        const fut=(pref.dates||[]).filter(d=>d>=todayStr).length;
        h+=`<div class="notif-item"><div class="notif-dot read"></div>
          <div class="notif-body">
            <div class="notif-title">${emp} — ${fut} giorno/i futuro/i preferito/i</div>
            ${pref.note?`<div style="font-size:0.75rem;color:var(--text3)">"${pref.note}"</div>`:''}
          </div>
          <a href="preferenze.html" class="btn btn-ghost btn-sm">Vedi →</a>
        </div>`;
      });
    }
  } else {
    // Dipendente
    const swapRecv=swapStore.filter(r=>r.targetColleagues?.includes(myEmp)&&r.responses?.[myEmp]==='pending'&&r.status==='pending');
    const coverRecv=coverStore.filter(r=>r.targetColleagues?.includes(myEmp)&&r.responses?.[myEmp]==='pending'&&r.status==='pending');
    const total=swapRecv.length+coverRecv.length;
    h+=`<div class="page-sub">${total} richiesta/e da rispondere</div>`;

    if(!total) h+=`<div class="notice notice-ok"><div class="notice-dot"></div>Nessuna notifica pendente.</div>`;

    if(swapRecv.length){
      h+=`<div class="sh"><span class="sh-title">Cambi turno (${swapRecv.length})</span></div>`;
      swapRecv.forEach(r=>{
        const ws=weekStart(r.weekOffset);
        const dtF=new Date(ws);dtF.setDate(ws.getDate()+r.fromDay);
        const dtW=new Date(ws);dtW.setDate(ws.getDate()+r.wantDay);
        h+=`<div class="notif-item"><div class="notif-dot"></div>
          <div class="notif-body">
            <div class="notif-title">${r.fromEmp} ti chiede un cambio turno</div>
            <div style="font-size:0.78rem;color:var(--text2)">Cede: ${DAYS[r.fromDay]} ${SN[r.fromShift]} · Tu dai: ${DAYS[r.wantDay]} ${SN[r.wantShift]}</div>
            ${r.note?`<div style="font-size:0.75rem;color:var(--text3)">"${r.note}"</div>`:''}
            <div class="notif-time">${new Date(r.createdAt).toLocaleString('it-IT')}</div>
          </div>
          <a href="cambi.html" class="btn btn-ghost btn-sm">Rispondi →</a>
        </div>`;
      });
    }
    if(coverRecv.length){
      h+=`<div class="sh"><span class="sh-title">Richieste di copertura (${coverRecv.length})</span></div>`;
      coverRecv.forEach(r=>{
        const ws=weekStart(r.weekOffset);const dt=new Date(ws);dt.setDate(ws.getDate()+r.dayIdx);
        h+=`<div class="notif-item"><div class="notif-dot"></div>
          <div class="notif-body">
            <div class="notif-title">${r.fromEmp} ti chiede di coprire il suo turno</div>
            <div style="font-size:0.78rem;color:var(--text2)">${DAYS[r.dayIdx]} ${fmt2(dt)} — ${SN[r.myShift]||r.myShift}</div>
            ${r.note?`<div style="font-size:0.75rem;color:var(--text3)">"${r.note}"</div>`:''}
            <div class="notif-time">${new Date(r.createdAt).toLocaleString('it-IT')}</div>
          </div>
          <a href="coperture.html" class="btn btn-ghost btn-sm">Rispondi →</a>
        </div>`;
      });
    }

    // Aggiornamenti su richieste inviate
    const swapResolved=swapStore.filter(r=>r.fromUid===user.uid&&r.status!=='pending');
    const coverResolved=coverStore.filter(r=>r.fromUid===user.uid&&r.status!=='pending');
    if(swapResolved.length||coverResolved.length){
      h+=`<div class="sh" style="margin-top:0.75rem"><span class="sh-title">Aggiornamenti</span></div>`;
      [...swapResolved,...coverResolved].sort((a,b)=>b.createdAt.localeCompare(a.createdAt)).forEach(r=>{
        const isSwap='fromShift' in r;
        const isCover='myShift' in r;
        const cls=r.status==='resolved'?'accepted':'rejected';
        const lbl=r.status==='resolved'?'Completato':'Annullato';
        h+=`<div class="notif-item"><div class="notif-dot read"></div>
          <div class="notif-body">
            <div class="notif-title">${isSwap?'Cambio turno':'Copertura'}: ${lbl.toLowerCase()}${r.winner?` — ${r.winner}`:''}</div>
            <div class="notif-time">${new Date(r.createdAt).toLocaleString('it-IT')}</div>
          </div>
          <span class="req-status ${cls}">${lbl}</span>
        </div>`;
      });
    }
  }

  document.getElementById('main').innerHTML=h;
}
window.addEventListener('fb-ready', function() {
  fbInit(()=>{ markFbReady(); render(); fbListenSwaps(render); fbListenCovers(render); });
}, { once: true });
</script>
</body>
</html>
