<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Turni — Accedi</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo"><svg viewBox="0 0 24 24"><path d="M3 6h18v2H3V6zm0 5h18v2H3v-2zm0 5h18v2H3v-2z"/></svg></div>
    <h1>Gestione Turni</h1>
    <p>Accedi con le tue credenziali</p>
    <div class="fg">
      <label>Account</label>
      <select id="login-user">
        <option value="">— seleziona —</option>
        <option value="domenico">Domenico (Titolare)</option>
        <option value="cristian">Cristian</option>
        <option value="manila">Manila</option>
        <option value="swami">Swami</option>
        <option value="matteo">Matteo</option>
        <option value="nico">Nico</option>
        <option value="giorgias">Giorgia S.</option>
        <option value="giorgiap">Giorgia P.</option>
        <option value="alessia">Alessia</option>
      </select>
    </div>
    <div class="fg">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="••••••">
    </div>
    <button class="btn-login" id="login-btn">Accedi</button>
    <div class="login-err" id="login-err">Credenziali non valide.</div>
  </div>
</div>
<!-- App core (classic script, defines globals) -->
<script src="app.js"></script>
<!-- Firebase (ES module, imports SDK v12 and exports to window.*) -->
<script type="module" src="firebase.js"></script>
<script>
// Redirect if already logged in
window.addEventListener('fb-ready', function() {
  fbInit(()=>{ markFbReady(); if(getCurrentUser()) window.location.href='home.html'; });
}, { once: true });

document.getElementById('login-btn').addEventListener('click', doLogin);
document.getElementById('login-pass').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });

function doLogin(){
  const uid=document.getElementById('login-user').value;
  const pwd=document.getElementById('login-pass').value;
  const errEl=document.getElementById('login-err');
  if(!uid||!ACCOUNTS[uid]||ACCOUNTS[uid].password!==pwd){
    errEl.style.display='block'; return;
  }
  errEl.style.display='none';
  setCurrentUser({ uid, displayName:ACCOUNTS[uid].displayName, role:ACCOUNTS[uid].role });
  window.location.href='home.html';
}
</script>
</body>
</html>
