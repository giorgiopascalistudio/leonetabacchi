<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Turni — Calendario</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebar-mount"></div>
  <main class="main-area" id="main"></main>
</div>
<!-- App core (classic script, defines globals) -->
<script src="app.js"></script>
<!-- Firebase (ES module, imports SDK v12 and exports to window.*) -->
<script type="module" src="firebase.js"></script>
<script>
const user=requireAuth();if(!user)throw 0;
document.getElementById('sidebar-mount').innerHTML=buildSidebar('calendario',user);
let weekOff=0;

function render(){
  const ws=weekStart(weekOff);
  const m1y=ws.getFullYear(),m1m=ws.getMonth();
  const m2=new Date(m1y,m1m+1,1);

  // Build sunday-free map
  const sundayFreeMap={};
  for(let o=weekOff-2;o<weekOff+12;o++){
    const sw=weekStart(o);const sun=new Date(sw);sun.setDate(sw.getDate()+6);
    const k=`${sun.getFullYear()}-${sun.getMonth()}-${sun.getDate()}`;
    sundayFreeMap[k]=EMPLOYEES[sunOffIdx(o)];
  }

  let h=`<div class="page-title">Calendario</div>
  <div class="page-sub">Domeniche libere · Ciclo ogni ${EMPLOYEES.length} settimane</div>
  <div class="sh">
    ${weekNavHtml()}
    ${user.role==='owner'?`<div class="sh-actions"><button class="btn btn-dark btn-sm" onclick="gen2m()">Genera 2 mesi</button></div>`:''}
  </div>
  <div class="cal-grid">`;

  [[m1y,m1m],[m2.getFullYear(),m2.getMonth()]].forEach(([y,m])=>{
    const todayD=new Date();todayD.setHours(0,0,0,0);
    h+=buildCalMonth(y,m,(dt,dow7,iso,isToday)=>{
      const isSunday=dow7===0;
      const k=`${dt.getFullYear()}-${dt.getMonth()}-${dt.getDate()}`;
      const freeName=sundayFreeMap[k];
      if(isToday) return{cls:'today-cal',content:dt.getDate()};
      if(freeName&&isSunday) return{cls:'sun-free',title:`Libero: ${freeName}`,content:`<div>${dt.getDate()}</div><div style="font-size:0.44rem;line-height:1.1">${freeName.split(' ')[0]}</div>`};
      if(isSunday) return{cls:'sunday',content:dt.getDate()};
      return{content:dt.getDate()};
    });
  });

  h+=`</div>
  <div class="card"><div class="card-title">Rotazione domeniche libere — prossime 8 settimane</div>
  <div style="overflow-x:auto"><table class="owner-stat-table"><thead><tr><th>Dipendente</th>`;

  const sundays=[];let o=weekOff;
  while(sundays.length<8){const sw=weekStart(o);const sun=new Date(sw);sun.setDate(sw.getDate()+6);sundays.push({date:sun,off:o});o++;}
  sundays.forEach(s=>{h+=`<th style="color:var(--amber);text-align:center">${fmt2(s.date)}</th>`;});
  h+=`</tr></thead><tbody>`;
  EMPLOYEES.forEach(emp=>{
    h+=`<tr><td style="font-weight:600">${emp}</td>`;
    sundays.forEach(s=>{
      const isFree=EMPLOYEES[sunOffIdx(s.off)]===emp;
      h+=`<td style="text-align:center"><span class="req-status ${isFree?'pending':'accepted'}" style="${isFree?'background:var(--amber-bg);color:var(--amber)':'background:var(--green-bg);color:var(--green)'}">${isFree?'Libero':'Lavora'}</span></td>`;
    });
    h+=`</tr>`;
  });
  h+=`</tbody></table></div></div>`;

  document.getElementById('main').innerHTML=h;
  attachWeekNav(()=>weekOff,v=>{weekOff=v;},render);
}
window.gen2m=()=>{ genTwoMonths(weekOff); alert('Turni generati!'); render(); };
window.addEventListener('fb-ready', function() {
  fbInit(()=>{ markFbReady(); render(); });
}, { once: true });
</script>
</body>
</html>
