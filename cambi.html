<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Turni — Cambi Turno</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
/* Inline fallback — active if style.css fails to load */

*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#f0f0f0;
  --bg2:#e6e6e6;
  --surface:#ffffff;
  --surface2:#f7f7f7;
  --border:#e0e0e0;
  --border2:#cccccc;
  --text:#1a1a1a;
  --text2:#5a5a5a;
  --text3:#999999;
  --green:#1a7a3c;
  --green-bg:#eaf5ef;
  --green-b:#9fd4b4;
  --red:#b01c1c;
  --red-bg:#fbeaea;
  --red-b:#e0a8a8;
  --amber:#8a5c00;
  --amber-bg:#fdf4e0;
  --amber-b:#d4b87a;
  --sat:#4a3f7a;
  --sat-bg:#eeeaf8;
  --sat-b:#b8aedd;
  --blue:#1a4a8a;
  --blue-bg:#eaf0fb;
  --blue-b:#9ab8e0;
  --r:16px;
  --r-sm:10px;
  --r-xs:7px;
  --shadow:0 2px 12px rgba(0,0,0,0.07);
  --shadow-md:0 4px 20px rgba(0,0,0,0.1);
  --fig:'Figtree',sans-serif;
  --mono:'JetBrains Mono',monospace;
}

body{font-family:var(--fig);font-size:14px;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* ── LAYOUT ── */
.app-layout{display:flex;min-height:100vh;}
.sidebar{
  width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:1.25rem 0.75rem;
  position:fixed;top:0;left:0;height:100vh;z-index:50;overflow-y:auto;
}
.main-area{margin-left:220px;flex:1;padding:1.75rem;min-width:0;}

/* ── SIDEBAR ── */
.sidebar-logo{display:flex;align-items:center;gap:0.6rem;padding:0 0.5rem;margin-bottom:1.75rem;}
.sidebar-logo-icon{width:34px;height:34px;background:var(--text);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sidebar-logo-icon svg{width:17px;height:17px;fill:#fff;}
.sidebar-logo-text{font-size:0.9rem;font-weight:700;letter-spacing:-0.01em;}
.nav-section{font-size:0.62rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);padding:0 0.5rem;margin-bottom:0.35rem;margin-top:0.75rem;display:block;}
.nav-section:first-of-type{margin-top:0;}
.nav-item{display:flex;align-items:center;gap:0.6rem;padding:0.55rem 0.75rem;border-radius:var(--r-xs);cursor:pointer;color:var(--text2);font-size:0.85rem;font-weight:500;transition:background 0.14s,color 0.14s;margin-bottom:0.1rem;border:none;background:none;width:100%;text-align:left;text-decoration:none;}
.nav-item:hover{background:var(--bg);color:var(--text);}
.nav-item.active{background:var(--text);color:#fff;}
.nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:0.7;}
.nav-item.active svg{opacity:1;}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:99px;font-size:0.58rem;font-weight:700;min-width:17px;height:17px;display:inline-flex;align-items:center;justify-content:center;padding:0 4px;}
.sidebar-footer{margin-top:auto;padding-top:0.75rem;}
.sidebar-user{display:flex;align-items:center;gap:0.6rem;padding:0.75rem 0.5rem;border-top:1px solid var(--border);}
.sidebar-avatar{width:30px;height:30px;background:var(--bg2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;color:var(--text2);flex-shrink:0;}
.sidebar-user-info{flex:1;min-width:0;}
.sidebar-user-name{font-size:0.8rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sidebar-user-role{font-size:0.65rem;color:var(--text3);}
.sidebar-logout{background:none;border:none;cursor:pointer;color:var(--text3);padding:0.25rem;border-radius:5px;transition:color 0.12s;display:flex;align-items:center;}
.sidebar-logout:hover{color:var(--red);}
.sidebar-logout svg{width:15px;height:15px;}

/* ── TYPOGRAPHY ── */
.page-title{font-size:1.4rem;font-weight:700;letter-spacing:-0.02em;margin-bottom:0.2rem;}
.page-sub{font-size:0.8rem;color:var(--text3);margin-bottom:1.5rem;}

/* ── CARDS ── */
.card{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);padding:1.25rem 1.5rem;margin-bottom:1rem;}
.card-title{font-size:0.72rem;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--text3);margin-bottom:0.85rem;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:0.4rem;border:none;border-radius:var(--r-xs);padding:0.55rem 1rem;font-family:var(--fig);font-size:0.8rem;font-weight:600;cursor:pointer;transition:opacity 0.15s,background 0.15s;text-decoration:none;}
.btn:hover{opacity:0.82;}
.btn-dark{background:var(--text);color:#fff;}
.btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border2);}
.btn-ghost:hover{background:var(--border);opacity:1;}
.btn-red{background:var(--red);color:#fff;}
.btn-green{background:var(--green);color:#fff;}
.btn-blue{background:var(--blue);color:#fff;}
.btn-sm{padding:0.38rem 0.75rem;font-size:0.75rem;}
.btn svg{width:14px;height:14px;}

/* ── STAT BOXES ── */
.stat-grid{display:grid;gap:0.75rem;margin-bottom:1rem;}
.stat-grid-4{grid-template-columns:repeat(4,1fr);}
.stat-grid-3{grid-template-columns:repeat(3,1fr);}
.stat-grid-2{grid-template-columns:repeat(2,1fr);}
.stat-box{background:var(--surface);border-radius:var(--r-sm);box-shadow:var(--shadow);padding:1rem 1.1rem;}
.stat-val{font-size:1.6rem;font-weight:700;line-height:1;margin-bottom:0.25rem;}
.stat-val.green{color:var(--green);}
.stat-val.red{color:var(--red);}
.stat-val.amber{color:var(--amber);}
.stat-val.blue{color:var(--blue);}
.stat-lbl{font-size:0.68rem;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:0.06em;}

/* ── PILLS ── */
.pill{display:inline-flex;align-items:center;justify-content:center;flex-direction:column;font-family:var(--mono);font-size:0.6rem;font-weight:500;padding:0.3rem 0.55rem;border-radius:6px;min-width:66px;line-height:1.3;text-align:center;border:1px solid transparent;}
.pill-M{background:var(--green-bg);color:var(--green);border-color:var(--green-b);}
.pill-S{background:var(--red-bg);color:var(--red);border-color:var(--red-b);}
.pill-OFF{background:var(--surface2);color:var(--text3);border-color:var(--border);}
.pill-OFF-SUN{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-b);}
.pill-SAT-M{background:var(--sat-bg);color:var(--sat);border-color:var(--sat-b);}
.pill-SAT-S{background:#e4e0f2;color:#3a3060;border-color:var(--sat-b);}
.pill-edit{cursor:pointer;transition:filter 0.12s;}
.pill-edit:hover{filter:brightness(0.9);}

/* ── TABLE ── */
.table-wrap{overflow-x:auto;border-radius:var(--r-sm);box-shadow:var(--shadow);background:var(--surface);}
table{width:100%;border-collapse:collapse;min-width:640px;}
thead th{background:var(--surface2);padding:0.6rem 0.55rem;font-family:var(--mono);font-size:0.6rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--text2);text-align:center;border-bottom:1px solid var(--border);white-space:nowrap;}
thead th:first-child{text-align:left;padding-left:1rem;min-width:110px;}
thead th.cs{color:var(--sat);}
thead th.cd{color:var(--amber);}
.subrow td{background:#fbfbfb;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:0.58rem;color:var(--text3);padding:0.18rem 0.55rem;text-align:center;}
.subrow td:first-child{text-align:left;padding-left:1rem;}
tbody tr{border-bottom:1px solid var(--border);transition:background 0.1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:#fafafa;}
tbody tr.me-row{background:#edf8f2;}
tbody tr.me-row:hover{background:#e4f5ec;}
tbody td{padding:0.42rem 0.45rem;text-align:center;vertical-align:middle;}
tbody td:first-child{text-align:left;padding-left:1rem;font-size:0.8rem;font-weight:500;white-space:nowrap;}

/* ── WEEK NAV ── */
.week-nav{display:flex;align-items:center;gap:0.5rem;background:var(--surface);border-radius:var(--r-xs);padding:0.35rem 0.5rem;box-shadow:var(--shadow);}
.week-nav button{background:none;border:none;cursor:pointer;color:var(--text2);width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:5px;transition:background 0.12s;font-size:1rem;}
.week-nav button:hover{background:var(--bg2);}
.week-label{font-size:0.72rem;color:var(--text2);min-width:13ch;text-align:center;font-family:var(--mono);}

/* ── NOTICE ── */
.notice{border-radius:var(--r-xs);padding:0.65rem 1rem;margin-bottom:0.85rem;font-size:0.78rem;font-weight:500;display:flex;align-items:center;gap:0.5rem;}
.notice-ok{background:var(--green-bg);color:var(--green);}
.notice-err{background:var(--red-bg);color:var(--red);}
.notice-warn{background:var(--amber-bg);color:var(--amber);}
.notice-blue{background:var(--blue-bg);color:var(--blue);}
.notice-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;}

/* ── SECTION HEADER ── */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;flex-wrap:wrap;gap:0.5rem;}
.sh-title{font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);}
.sh-actions{display:flex;gap:0.5rem;align-items:center;}

/* ── SEC TABS ── */
.sec-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1.25rem;}
.sec-tab{font-size:0.78rem;font-weight:600;padding:0.55rem 1rem;cursor:pointer;border:none;background:none;color:var(--text3);border-bottom:2px solid transparent;transition:color 0.14s;}
.sec-tab:hover{color:var(--text2);}
.sec-tab.active{color:var(--text);border-bottom-color:var(--text);}

/* ── DAY STRIP ── */
.day-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:0.5rem;}
.day-box{background:var(--surface);border-radius:var(--r-sm);box-shadow:var(--shadow);padding:0.75rem 0.5rem;text-align:center;}
.day-box.today{outline:2px solid var(--border2);outline-offset:1px;}
.day-name{font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);margin-bottom:0.2rem;}
.day-date{font-size:0.7rem;font-weight:600;color:var(--text2);margin-bottom:0.45rem;}
.day-shift{font-size:0.72rem;font-weight:700;padding:0.35rem 0.2rem;border-radius:6px;border:1px solid transparent;}
.day-shift.M{color:var(--green);background:var(--green-bg);border-color:var(--green-b);}
.day-shift.S{color:var(--red);background:var(--red-bg);border-color:var(--red-b);}
.day-shift.OFF{color:var(--text3);background:var(--surface2);border-color:var(--border);}
.day-shift.OFF-SUN{color:var(--amber);background:var(--amber-bg);border-color:var(--amber-b);}
.day-shift.SAT-M{color:var(--sat);background:var(--sat-bg);border-color:var(--sat-b);}
.day-shift.SAT-S{color:#3a3060;background:#e4e0f2;border-color:var(--sat-b);}
.day-time{font-size:0.58rem;color:var(--text3);margin-top:0.22rem;font-family:var(--mono);}

/* ── REQUEST CARDS ── */
.req-card{background:var(--surface);border-radius:var(--r-sm);box-shadow:var(--shadow);padding:1rem 1.25rem;margin-bottom:0.65rem;display:flex;align-items:flex-start;gap:1rem;flex-wrap:wrap;}
.req-card-body{flex:1;min-width:0;}
.req-card-title{font-size:0.88rem;font-weight:700;margin-bottom:0.2rem;}
.req-card-sub{font-size:0.75rem;color:var(--text3);margin-bottom:0.2rem;}
.req-card-note{font-size:0.78rem;color:var(--text2);background:var(--surface2);border-radius:var(--r-xs);padding:0.4rem 0.65rem;margin-top:0.35rem;}
.req-card-actions{display:flex;gap:0.5rem;align-items:center;flex-shrink:0;}
.req-status{font-size:0.7rem;font-weight:700;padding:0.3rem 0.7rem;border-radius:99px;white-space:nowrap;}
.req-status.pending{background:var(--amber-bg);color:var(--amber);}
.req-status.accepted,.req-status.resolved{background:var(--green-bg);color:var(--green);}
.req-status.rejected,.req-status.cancelled{background:var(--red-bg);color:var(--red);}

/* ── NOTIFICATIONS ── */
.notif-item{background:var(--surface);border-radius:var(--r-sm);box-shadow:var(--shadow);padding:0.85rem 1.1rem;margin-bottom:0.5rem;display:flex;gap:0.85rem;align-items:flex-start;}
.notif-dot{width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0;margin-top:5px;}
.notif-dot.read{background:var(--border2);}
.notif-body{flex:1;}
.notif-title{font-size:0.85rem;font-weight:600;margin-bottom:0.15rem;}
.notif-time{font-size:0.68rem;color:var(--text3);}

/* ── OWNER STATS TABLE ── */
.owner-stat-table{width:100%;border-collapse:collapse;}
.owner-stat-table td,.owner-stat-table th{padding:0.55rem 0.85rem;text-align:left;border-bottom:1px solid var(--border);font-size:0.82rem;}
.owner-stat-table th{font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);background:var(--surface2);}
.owner-stat-table tr:last-child td{border-bottom:none;}
.mini-bar{height:6px;border-radius:99px;background:var(--border);overflow:hidden;margin-top:4px;}
.mini-bar-fill{height:100%;border-radius:99px;background:var(--green);transition:width 0.3s;}

/* ── CALENDAR ── */
.cal-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;margin-bottom:1rem;}
.cal-month{background:var(--surface);border-radius:var(--r-sm);box-shadow:var(--shadow);padding:1rem 1.1rem;}
.cal-month-title{font-size:0.8rem;font-weight:700;margin-bottom:0.75rem;text-transform:capitalize;}
.cal-weeks{display:flex;flex-direction:column;gap:0.2rem;}
.cal-week{display:grid;grid-template-columns:repeat(7,1fr);gap:0.2rem;}
.cal-dh{font-size:0.58rem;font-weight:700;text-align:center;color:var(--text3);text-transform:uppercase;padding:0.15rem 0;}
.cal-day{font-size:0.68rem;text-align:center;padding:0.28rem 0.1rem;border-radius:5px;color:var(--text2);font-weight:500;cursor:default;}
.cal-day.empty{background:none;}
.cal-day.weekend{color:var(--text3);}
.cal-day.past{opacity:0.35;}
.cal-day.clickable{cursor:pointer;transition:background 0.12s;}
.cal-day.clickable:hover{background:var(--bg2);}
.cal-day.selected-pref{background:var(--green);color:#fff;border-radius:6px;font-weight:700;}
.cal-day.sun-free{background:var(--amber-bg);color:var(--amber);font-weight:700;border:1px solid var(--amber-b);}
.cal-day.today-cal{background:var(--text);color:#fff;border-radius:50%;}

/* ── FORM ELEMENTS ── */
.form-row{display:flex;gap:0.75rem;margin-bottom:1rem;flex-wrap:wrap;}
.form-field{flex:1;min-width:0;}
.form-field label{display:block;font-size:0.72rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.4rem;}
.form-field select,.form-field textarea,.form-field input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-xs);padding:0.6rem 0.85rem;font-family:var(--fig);font-size:0.85rem;color:var(--text);outline:none;transition:border-color 0.2s;}
.form-field select:focus,.form-field textarea:focus,.form-field input:focus{border-color:var(--border2);}
.form-field textarea{resize:vertical;min-height:70px;}
.input-group{margin-bottom:1rem;}
.input-group label{display:block;font-size:0.72rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.4rem;}
.input-group input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-xs);padding:0.6rem 0.85rem;font-family:var(--fig);font-size:0.9rem;color:var(--text);outline:none;transition:border-color 0.2s;}
.input-group input:focus{border-color:var(--border2);}
.acct-notice{font-size:0.75rem;border-radius:var(--r-xs);padding:0.6rem 0.9rem;margin-top:0.75rem;display:none;font-weight:500;}
.acct-notice.ok{background:var(--green-bg);color:var(--green);}
.acct-notice.err{background:var(--red-bg);color:var(--red);}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:200;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow-md);padding:1.5rem;width:320px;max-width:95vw;}
.modal h3{font-size:0.9rem;font-weight:700;margin-bottom:1rem;}
.shift-opts{display:flex;flex-direction:column;gap:0.4rem;margin-bottom:1rem;}
.shift-opt{padding:0.6rem 0.9rem;border-radius:var(--r-xs);border:1.5px solid var(--border);cursor:pointer;font-size:0.82rem;font-weight:500;background:var(--surface2);color:var(--text2);text-align:left;transition:all 0.12s;}
.shift-opt:hover{border-color:var(--border2);background:var(--bg);}
.shift-opt.sel-M{background:var(--green-bg);color:var(--green);border-color:var(--green-b);}
.shift-opt.sel-S{background:var(--red-bg);color:var(--red);border-color:var(--red-b);}
.shift-opt.sel-OFF{background:var(--surface2);color:var(--text3);border-color:var(--border2);}
.shift-opt.sel-SAT-M{background:var(--sat-bg);color:var(--sat);border-color:var(--sat-b);}
.shift-opt.sel-SAT-S{background:#e4e0f2;color:#3a3060;border-color:var(--sat-b);}
.modal-actions{display:flex;gap:0.5rem;justify-content:flex-end;}

/* ── LOGIN ── */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#e8e8e8 0%,#f0f0f0 100%);}
.login-card{background:var(--surface);border-radius:24px;box-shadow:var(--shadow-md);width:360px;padding:2.5rem 2.25rem;}
.login-logo{width:44px;height:44px;background:var(--text);border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:1.25rem;}
.login-logo svg{width:22px;height:22px;fill:#fff;}
.login-card h1{font-size:1.3rem;font-weight:700;margin-bottom:0.2rem;}
.login-card p{font-size:0.8rem;color:var(--text3);margin-bottom:1.75rem;}
.fg{margin-bottom:1rem;}
.fg label{display:block;font-size:0.72rem;font-weight:600;color:var(--text2);letter-spacing:0.04em;text-transform:uppercase;margin-bottom:0.4rem;}
.fg input,.fg select{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-xs);padding:0.6rem 0.85rem;font-family:var(--fig);font-size:0.9rem;color:var(--text);outline:none;transition:border-color 0.2s;appearance:none;}
.fg input:focus,.fg select:focus{border-color:var(--border2);}
.btn-login{width:100%;background:var(--text);color:#fff;border:none;border-radius:var(--r-xs);padding:0.75rem;font-family:var(--fig);font-size:0.9rem;font-weight:600;cursor:pointer;transition:opacity 0.15s;margin-top:0.25rem;}
.btn-login:hover{opacity:0.82;}
.login-err{font-size:0.75rem;color:var(--red);margin-top:0.6rem;display:none;}

/* ── TOMORROW CARD ── */
.tomorrow-card{background:var(--text);color:#fff;border-radius:var(--r);padding:1.25rem 1.5rem;margin-bottom:1rem;display:flex;align-items:center;gap:1.5rem;}
.tc-label{font-size:0.7rem;opacity:0.5;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.2rem;}
.tc-shift{font-size:1.6rem;font-weight:700;letter-spacing:-0.02em;}
.tc-time{font-size:0.78rem;opacity:0.55;font-family:var(--mono);}
.tc-icon{font-size:2.2rem;opacity:0.15;}
.tc-shift-badge-M{color:#6effa0;}
.tc-shift-badge-S{color:#ffaa88;}
.tc-shift-badge-O{color:#aaa;}

/* ── EMP GRID ── */
.emp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:0.75rem;margin-bottom:1rem;}
.emp-card{background:var(--surface);border-radius:var(--r-sm);box-shadow:var(--shadow);padding:1rem 1.1rem;}
.emp-card-name{font-size:0.85rem;font-weight:700;margin-bottom:0.5rem;}
.emp-card-stats{display:flex;gap:0.65rem;flex-wrap:wrap;}
.emp-stat{font-size:0.7rem;color:var(--text3);}
.emp-stat b.g{color:var(--green);}
.emp-stat b.r{color:var(--red);}

/* ── VAL ITEMS ── */
.val-item{display:flex;align-items:center;gap:0.5rem;padding:0.5rem 0.75rem;background:var(--red-bg);border-radius:var(--r-xs);color:var(--red);font-size:0.78rem;font-weight:500;margin-bottom:0.35rem;}
.val-ok-item{display:flex;align-items:center;gap:0.5rem;padding:0.5rem 0.75rem;background:var(--green-bg);border-radius:var(--r-xs);color:var(--green);font-size:0.78rem;font-weight:500;margin-bottom:0.35rem;}

/* ── SWAP TABLE ── */
.pill-sel-give{background:var(--green)!important;color:#fff!important;border-color:var(--green)!important;cursor:default!important;}
.pill-sel-want{background:var(--red)!important;color:#fff!important;border-color:var(--red)!important;cursor:default!important;}
.pill-sel-cover{background:var(--blue)!important;color:#fff!important;border-color:var(--blue)!important;cursor:default!important;}
.pill-available{cursor:pointer!important;outline:2px dashed var(--border2);outline-offset:2px;}
.pill-available:hover{filter:brightness(0.88)!important;}

/* ── HAMBURGER ── */
.hamburger{display:none;position:fixed;top:1rem;left:1rem;z-index:60;background:var(--surface);border-radius:8px;box-shadow:var(--shadow);border:none;cursor:pointer;padding:0.5rem;}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);transition:transform 0.25s;}
  .sidebar.open{transform:translateX(0);}
  .main-area{margin-left:0;padding:1rem;}
  .stat-grid-4{grid-template-columns:repeat(2,1fr);}
  .day-strip{grid-template-columns:repeat(4,1fr);}
  .cal-grid{grid-template-columns:1fr;}
  .hamburger{display:flex;}
}

</style>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-mount"></div>
  <main class="main-area" id="main"></main>
</div>
<!-- App core (classic script, defines globals) -->
<script src="app.js"></script>
<!-- Firebase (ES module, imports SDK v12 and exports to window.*) -->
<script type="module" src="firebase.js"></script>
<script>
const user = requireAuth();
if(!user) throw 0;
document.getElementById('sidebar-mount').innerHTML = buildSidebar('cambi', user);
const isOwner = user.role==='owner';
const myEmp = isOwner ? null : UID_TO_EMP[user.uid];

let tab='new', swapWeekOff=0;
let giveDay=null, giveShift=null, wantDay=null, wantShift=null, wantEmp=null;

function reset(){ giveDay=null;giveShift=null;wantDay=null;wantShift=null;wantEmp=null; }

function render(){
  if(isOwner){ renderOwner(); return; }
  const sentCount=swapStore.filter(r=>r.fromUid===user.uid).length;
  const recCount=swapStore.filter(r=>r.targetColleagues?.includes(myEmp)&&r.responses?.[myEmp]==='pending'&&r.status==='pending').length;
  let h=`<div class="page-title">Cambi Turno</div>
  <div class="page-sub">Scambia il tuo turno con quello di un collega</div>
  <div class="sec-tabs">
    <button class="sec-tab ${tab==='new'?'active':''}" onclick="setTab('new')">Nuova richiesta</button>
    <button class="sec-tab ${tab==='sent'?'active':''}" onclick="setTab('sent')">Inviate (${sentCount})</button>
    <button class="sec-tab ${tab==='received'?'active':''}" onclick="setTab('received')">Da rispondere <span style="background:var(--red);color:#fff;border-radius:99px;font-size:0.6rem;padding:0.1rem 0.4rem;margin-left:4px">${recCount}</span></button>
  </div>`;
  if(tab==='new') h+=renderTable();
  else if(tab==='sent') h+=renderSent();
  else h+=renderReceived();
  document.getElementById('main').innerHTML=h;
  attachWeekNav(()=>swapWeekOff,v=>{swapWeekOff=v;reset();render();},render);
}
window.setTab=t=>{ tab=t; render(); };

function renderTable(){
  const res=getOrGen(swapWeekOff);
  const ws=weekStart(swapWeekOff);
  let h=`<div class="card">
  <div class="card-title">Seleziona i turni da scambiare</div>
  <p style="font-size:0.8rem;color:var(--text2);margin-bottom:0.85rem">
    <span style="display:inline-block;width:11px;height:11px;background:var(--green);border-radius:3px;vertical-align:middle;margin-right:3px"></span>Verde = turno che cedi &nbsp;·&nbsp;
    <span style="display:inline-block;width:11px;height:11px;background:var(--red);border-radius:3px;vertical-align:middle;margin-right:3px"></span>Rosso = turno che prendi
  </p>
  <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1rem;flex-wrap:wrap">
    ${weekNavHtml()}
    <div style="font-size:0.78rem;color:var(--text2)">
      Cedi: <strong style="color:${giveDay!==null?'var(--green)':'var(--text3)'}">${giveDay!==null?DAYS[giveDay]+' '+SN[giveShift]:'—'}</strong>
      &nbsp;↔&nbsp;
      Prendi: <strong style="color:${wantDay!==null?'var(--red)':'var(--text3)'}">${wantDay!==null?DAYS[wantDay]+' '+SN[wantShift]+' ('+wantEmp+')':'—'}</strong>
    </div>
  </div>`;

  if(!res.schedule){
    h+=`<div class="notice notice-warn"><div class="notice-dot"></div>Nessun turno generato.</div></div>`;
    return h;
  }
  h+=`<div class="table-wrap"><table><thead><tr><th>Dipendente</th>`;
  for(let d=0;d<7;d++){const dt=new Date(ws);dt.setDate(ws.getDate()+d);h+=`<th class="${d===5?'cs':d===6?'cd':''}">${DAYS[d]}<br><span style="font-size:0.55rem;opacity:0.6">${fmt2(dt)}</span></th>`;}
  h+=`</tr></thead><tbody>`;

  EMPLOYEES.forEach(emp=>{
    const isMe=emp===myEmp;
    h+=`<tr class="${isMe?'me-row':''}"><td>${emp}${isMe?' <span style="font-size:0.62rem;color:var(--green);font-weight:700">← tu</span>':''}</td>`;
    for(let d=0;d<7;d++){
      const code=res.schedule[emp][d];
      let cls=pillCls(code,d), extra='', oc='';
      if(isMe&&code!=='O'){
        if(giveDay===d){ cls+=' pill-sel-give'; }
        else{ extra='pill-edit'; oc=`onclick="selGive(${d},'${code}')" title="Cedi questo turno"`; }
      } else if(!isMe&&code!=='O'&&giveDay!==null){
        if(wantDay===d&&wantEmp===emp){ cls+=' pill-sel-want'; }
        else{ extra='pill-available'; oc=`onclick="selWant(${d},'${code}','${emp}')" title="Prendi questo turno"`; }
      }
      h+=`<td><span class="${cls} ${extra}" ${oc}>${pillShort(code)}<br><span style="font-size:0.52rem;opacity:0.7">${SL[code]||''}</span></span></td>`;
    }
    h+=`</tr>`;
  });
  h+=`</tbody></table></div>`;

  if(giveDay!==null&&wantDay!==null){
    const canSend=EMPLOYEES.filter(e=>e!==myEmp&&res.schedule[e][wantDay]===wantShift);
    h+=`<div style="margin-top:1rem;padding:1rem;background:var(--surface2);border-radius:var(--r-xs)">
      <div class="form-row">
        <div class="form-field">
          <label>Motivazione <span style="font-weight:400;opacity:0.6">(opzionale)</span></label>
          <input type="text" id="sw-note" placeholder="Es: impegno familiare...">
        </div>
      </div>
      <div style="display:flex;gap:0.5rem">
        <button class="btn btn-dark" onclick="submitSwap('${myEmp}')">Invia richiesta</button>
        <button class="btn btn-ghost btn-sm" onclick="reset();render()">Azzera</button>
      </div>
      <div style="font-size:0.72rem;color:var(--text3);margin-top:0.5rem">La richiesta andrà a tutti i colleghi con quel turno.</div>
    </div>`;
  } else {
    h+=`<p style="font-size:0.78rem;color:var(--text3);margin-top:0.85rem">${giveDay===null?'1. Clicca il tuo turno (verde) da cedere.':'2. Clicca il turno di un collega (rosso) che vuoi prendere.'}</p>`;
  }
  h+=`</div>`;
  return h;
}

window.selGive=function(d,code){ giveDay=d;giveShift=code;wantDay=null;wantShift=null;wantEmp=null;render(); };
window.selWant=function(d,code,emp){ wantDay=d;wantShift=code;wantEmp=emp;render(); };

window.submitSwap=function(myEmp){
  const res=getOrGen(swapWeekOff);
  if(!res.schedule||giveDay===null||wantDay===null) return;
  const note=document.getElementById('sw-note')?.value||'';
  const targets=EMPLOYEES.filter(e=>e!==myEmp&&res.schedule[e][wantDay]===wantShift);
  if(!targets.length){alert('Nessun collega disponibile.');return;}
  const responses={}; targets.forEach(e=>{responses[e]='pending';});
  swapStore.unshift({
    id:genId(),fromUid:user.uid,fromEmp:myEmp,
    fromShift:giveShift,fromDay:giveDay,
    wantShift,wantDay,
    weekOffset:swapWeekOff,weekKeyStr:weekKey(swapWeekOff),
    targetColleagues:targets,responses,
    status:'pending',winner:null,note,createdAt:new Date().toISOString()
  });
  saveSwaps(); if(_fbReady) fbSaveSwap(swapStore[0]).catch(console.error); reset(); tab='sent'; render();
};

function renderSent(){
  const mine=swapStore.filter(r=>r.fromUid===user.uid);
  if(!mine.length) return`<div style="color:var(--text3);font-size:0.85rem;padding:1rem 0">Nessuna richiesta inviata.</div>`;
  return mine.map(r=>{
    const ws=weekStart(r.weekOffset);
    const dtF=new Date(ws);dtF.setDate(ws.getDate()+r.fromDay);
    const dtW=new Date(ws);dtW.setDate(ws.getDate()+r.wantDay);
    const sCls=r.status==='resolved'?'accepted':r.status==='cancelled'?'rejected':'pending';
    const sLbl=r.status==='resolved'?'Completato':r.status==='cancelled'?'Annullato':'In attesa';
    return`<div class="req-card">
      <div class="req-card-body">
        <div class="req-card-title">
          ${DAYS[r.fromDay]} <span style="color:var(--green)">${SN[r.fromShift]}</span>
          ↔ ${DAYS[r.wantDay]} <span style="color:var(--red)">${SN[r.wantShift]}</span>
        </div>
        <div class="req-card-sub">Sett. ${fmt3(ws)} · Con: ${r.targetColleagues.join(', ')}</div>
        ${r.winner?`<div class="req-card-sub" style="color:var(--green)">✓ Assegnato a: ${r.winner}</div>`:''}
        ${r.note?`<div class="req-card-note">"${r.note}"</div>`:''}
      </div>
      <div class="req-card-actions">
        <span class="req-status ${sCls}">${sLbl}</span>
        ${r.status==='pending'?`<button class="btn btn-ghost btn-sm" onclick="cancelSwap('${r.id}')">Annulla</button>`:''}
      </div>
    </div>`;
  }).join('');
}
window.cancelSwap=function(id){ const r=swapStore.find(x=>x.id===id); if(r) r.status='cancelled'; saveSwaps(); render(); };

function renderReceived(){
  const recv=swapStore.filter(r=>r.targetColleagues?.includes(myEmp)&&r.responses?.[myEmp]==='pending'&&r.status==='pending');
  if(!recv.length) return`<div style="color:var(--text3);font-size:0.85rem;padding:1rem 0">Nessuna richiesta da rispondere.</div>`;
  return recv.map(r=>{
    const ws=weekStart(r.weekOffset);
    const dtF=new Date(ws);dtF.setDate(ws.getDate()+r.fromDay);
    const dtW=new Date(ws);dtW.setDate(ws.getDate()+r.wantDay);
    return`<div class="req-card">
      <div class="req-card-body">
        <div class="req-card-title">${r.fromEmp} ti chiede un cambio</div>
        <div class="req-card-sub">Lui cede: <strong style="color:var(--green)">${DAYS[r.fromDay]} ${fmt2(dtF)} — ${SN[r.fromShift]}</strong></div>
        <div class="req-card-sub">Tu daresti: <strong style="color:var(--red)">${DAYS[r.wantDay]} ${fmt2(dtW)} — ${SN[r.wantShift]}</strong></div>
        ${r.note?`<div class="req-card-note">💬 "${r.note}"</div>`:''}
        <div class="req-card-sub">Richiesta anche a: ${r.targetColleagues.filter(e=>e!==myEmp).join(', ')||'solo te'}</div>
      </div>
      <div class="req-card-actions">
        <button class="btn btn-green btn-sm" onclick="respondSwap('${r.id}','${myEmp}','accepted')">✓ Accetta</button>
        <button class="btn btn-red btn-sm" onclick="respondSwap('${r.id}','${myEmp}','rejected')">✕ Rifiuta</button>
      </div>
    </div>`;
  }).join('');
}

window.respondSwap=function(id,myEmp,answer){
  const r=swapStore.find(x=>x.id===id); if(!r||r.status!=='pending') return;
  r.responses[myEmp]=answer;
  const acceptors=Object.entries(r.responses).filter(([,v])=>v==='accepted').map(([k])=>k);
  const allAnswered=Object.values(r.responses).every(v=>v!=='pending');
  if(acceptors.length>0){
    const k=r.weekKeyStr; const sched=schedStore[k]?.schedule;
    let winner=acceptors[0];
    if(sched&&acceptors.length>1){
      let minWork=999; acceptors.forEach(emp=>{ const worked=(sched[emp]||[]).filter(s=>s&&s!=='O').length; if(worked<minWork){minWork=worked;winner=emp;} });
    }
    r.winner=winner; r.status='resolved';
    if(sched){ const tmp=sched[r.fromEmp][r.fromDay]; sched[r.fromEmp][r.fromDay]=sched[winner][r.wantDay]; sched[winner][r.wantDay]=tmp; saveSched(); }
    acceptors.filter(e=>e!==winner).forEach(e=>{r.responses[e]='rejected_auto';});
  }
  if(allAnswered&&!acceptors.length) r.status='cancelled';
  saveSwaps(); if(_fbReady) fbSaveSwap(r).catch(console.error); tab='received'; render();
};

function renderOwner(){
  const EMP_TO_UID2=EMP_TO_UID;
  let h=`<div class="page-title">Cambi Turno</div><div class="page-sub">Panoramica completa</div>`;
  h+=`<div class="card"><div class="card-title">Statistiche per dipendente</div>
    <div style="overflow-x:auto"><table class="owner-stat-table">
      <thead><tr><th>Dipendente</th><th>Inviate</th><th>Completate</th><th>Ann.</th><th>Vinte</th><th>Tasso</th></tr></thead><tbody>`;
  EMPLOYEES.forEach(emp=>{
    const euid=EMP_TO_UID2[emp];
    const sent=swapStore.filter(r=>r.fromUid===euid);
    const res=sent.filter(r=>r.status==='resolved').length;
    const can=sent.filter(r=>r.status==='cancelled').length;
    const won=swapStore.filter(r=>r.winner===emp).length;
    const total=sent.length, rate=total>0?Math.round(res/total*100):0;
    h+=`<tr><td style="font-weight:600">${emp}</td><td>${total}</td><td style="color:var(--green);font-weight:600">${res}</td><td style="color:var(--red);font-weight:600">${can}</td><td style="color:var(--amber);font-weight:600">${won}</td>
      <td style="min-width:90px">${total>0?`<div style="font-size:0.72rem;font-weight:600">${rate}%</div><div class="mini-bar"><div class="mini-bar-fill" style="width:${rate}%"></div></div>`:'—'}</td></tr>`;
  });
  h+=`</tbody></table></div></div>`;
  h+=`<div class="sh"><span class="sh-title">Tutte le richieste (${swapStore.length})</span></div>`;
  if(!swapStore.length) h+=`<div style="color:var(--text3);font-size:0.85rem">Nessuna.</div>`;
  else h+=swapStore.map(r=>{
    const ws=weekStart(r.weekOffset);const sCls=r.status==='resolved'?'accepted':r.status==='cancelled'?'rejected':'pending';
    return`<div class="req-card">
      <div class="req-card-body">
        <div class="req-card-title">${r.fromEmp}: ${DAYS[r.fromDay]} ${SN[r.fromShift]} ↔ ${DAYS[r.wantDay]} ${SN[r.wantShift]}</div>
        <div class="req-card-sub">Con: ${r.targetColleagues.join(', ')} · Sett. ${fmt3(ws)}</div>
        ${r.winner?`<div class="req-card-sub" style="color:var(--green)">Assegnato a: ${r.winner}</div>`:''}
      </div>
      <div class="req-card-actions">
        <span class="req-status ${sCls}">${r.status==='resolved'?'Fatto':r.status==='cancelled'?'Ann.':'Attesa'}</span>
        <button class="btn btn-ghost btn-sm" onclick="del('${r.id}')">✕</button>
      </div>
    </div>`;
  }).join('');
  document.getElementById('main').innerHTML=h;
}
window.del=function(id){ swapStore=swapStore.filter(r=>r.id!==id); saveSwaps(); renderOwner(); };
function _startApp(){ fbInit(()=>{ markFbReady(); render(); fbListenSwaps(render); }); }
if(window._firebaseModuleReady) _startApp();
else window._firebaseReadyCallback = _startApp;
</script>
</body>
</html>
