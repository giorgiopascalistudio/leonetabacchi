<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Turni — Account</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebar-mount"></div>
  <main class="main-area" id="main"></main>
</div>
<!-- App core (classic script, defines globals) -->
<script src="app.js"></script>
<!-- Firebase (ES module, imports SDK v12 and exports to window.*) -->
<script type="module" src="firebase.js"></script>
<script>
const user=requireAuth();if(!user)throw 0;
document.getElementById('sidebar-mount').innerHTML=buildSidebar('account',user);
const isOwner=user.role==='owner';

function render(){
  const acc=ACCOUNTS[user.uid];
  let h=`<div class="page-title">Account</div>
  <div class="page-sub">Gestisci il tuo profilo</div>

  <div class="card" style="max-width:420px">
    <div class="card-title">Nome visualizzato</div>
    <div class="input-group">
      <label>Nome</label>
      <input type="text" id="acct-name" value="${acc.displayName}" placeholder="Il tuo nome">
    </div>
    <button class="btn btn-dark btn-sm" onclick="saveName()">Salva nome</button>
    <div class="acct-notice" id="name-notice"></div>
  </div>

  <div class="card" style="max-width:420px">
    <div class="card-title">Cambia password</div>
    <div class="input-group"><label>Password attuale</label><input type="password" id="acct-old" placeholder="••••••"></div>
    <div class="input-group"><label>Nuova password</label><input type="password" id="acct-new" placeholder="••••••"></div>
    <div class="input-group"><label>Conferma</label><input type="password" id="acct-new2" placeholder="••••••"></div>
    <button class="btn btn-dark btn-sm" onclick="savePass()">Cambia password</button>
    <div class="acct-notice" id="pass-notice"></div>
  </div>`;

  if(isOwner){
    h+=`<div class="card">
      <div class="card-title">Credenziali dipendenti</div>
      <table class="owner-stat-table"><thead><tr>
        <th>Utente</th><th>Nome</th><th>Password</th><th></th>
      </tr></thead><tbody>`;
    Object.entries(ACCOUNTS).filter(([uid])=>uid!=='domenico').forEach(([uid,a])=>{
      h+=`<tr>
        <td style="font-family:var(--mono);font-size:0.75rem;color:var(--text2)">${uid}</td>
        <td style="font-weight:500">${a.displayName}</td>
        <td style="font-family:var(--mono);font-size:0.75rem;color:var(--text3)" id="pass-${uid}">••••••</td>
        <td style="text-align:right"><button class="btn btn-ghost btn-sm" onclick="togglePass('${uid}')">Mostra</button></td>
      </tr>`;
    });
    h+=`</tbody></table></div>`;
  }

  document.getElementById('main').innerHTML=h;
}

window.saveName=function(){
  const val=document.getElementById('acct-name').value.trim();
  const n=document.getElementById('name-notice');
  if(!val){n.className='acct-notice err';n.style.display='block';n.textContent='Inserisci un nome valido.';return;}
  ACCOUNTS[user.uid].displayName=val;
  setCurrentUser({...user,displayName:val});
  saveAccounts(); if(_fbReady) fbSaveAccounts().then(()=>showFbSuccess('Nome aggiornato')).catch(console.error);
  document.getElementById('sidebar-mount').innerHTML=buildSidebar('account',{...user,displayName:val});
  n.className='acct-notice ok';n.style.display='block';n.textContent='Nome aggiornato.';
  setTimeout(()=>{n.style.display='none';},3000);
};

window.savePass=function(){
  const old=document.getElementById('acct-old').value;
  const nw=document.getElementById('acct-new').value;
  const nw2=document.getElementById('acct-new2').value;
  const n=document.getElementById('pass-notice');
  if(ACCOUNTS[user.uid].password!==old){n.className='acct-notice err';n.style.display='block';n.textContent='Password attuale non corretta.';return;}
  if(nw.length<4){n.className='acct-notice err';n.style.display='block';n.textContent='Min. 4 caratteri.';return;}
  if(nw!==nw2){n.className='acct-notice err';n.style.display='block';n.textContent='Le password non coincidono.';return;}
  ACCOUNTS[user.uid].password=nw; saveAccounts();
  n.className='acct-notice ok';n.style.display='block';n.textContent='Password aggiornata.';
  document.getElementById('acct-old').value='';document.getElementById('acct-new').value='';document.getElementById('acct-new2').value='';
  setTimeout(()=>{n.style.display='none';},3000);
};

window.togglePass=function(uid){
  const el=document.getElementById('pass-'+uid);if(!el)return;
  el.textContent=el.textContent==='••••••'?ACCOUNTS[uid].password:'••••••';
};

window.addEventListener('fb-ready', function() {
  fbInit(()=>{ markFbReady(); render(); });
}, { once: true });
</script>
</body>
</html>
