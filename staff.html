<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Turni — Dipendenti</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebar-mount"></div>
  <main class="main-area" id="main"></main>
</div>
<!-- App core (classic script, defines globals) -->
<script src="app.js"></script>
<!-- Firebase (ES module, imports SDK v12 and exports to window.*) -->
<script type="module" src="firebase.js"></script>
<script>
const user=requireOwner();if(!user)throw 0;
document.getElementById('sidebar-mount').innerHTML=buildSidebar('staff',user);
let weekOff=0;

function render(){
  const res=getOrGen(weekOff);
  const ws=weekStart(weekOff);
  const errs=res.schedule?valSched(res.schedule,res.sunOffEmp):[];

  let h=`<div class="page-title">Dipendenti</div>
  <div class="sh">${weekNavHtml()}</div>`;

  if(!errs.length&&res.schedule){
    h+=`<div class="notice notice-ok"><div class="notice-dot"></div>Tutti i vincoli rispettati.</div>`;
  } else if(errs.length){
    errs.forEach(e=>{h+=`<div class="val-item">✗ ${e}</div>`;});
  }

  if(!res.schedule){
    h+=`<div class="notice notice-warn"><div class="notice-dot"></div>Nessun turno per questa settimana.</div>`;
    document.getElementById('main').innerHTML=h;
    attachWeekNav(()=>weekOff,v=>{weekOff=v;},render); return;
  }

  // Domenica libera questa settimana
  h+=`<div class="notice notice-ok" style="margin-bottom:1rem"><div class="notice-dot"></div>Domenica libera questa settimana: <strong>${res.sunOffEmp}</strong></div>`;

  EMPLOYEES.forEach(emp=>{
    const sh=res.schedule[emp];
    const mC=sh.filter(s=>s==='M'||s==='SAT-M').length;
    const sC=sh.filter(s=>s==='S'||s==='SAT-S').length;
    const oC=sh.filter(s=>s==='O').length;
    const sunFree=sh[6]==='O';
    h+=`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:0.75rem">
        <div style="font-size:0.95rem;font-weight:700">${emp}</div>
        <div style="font-size:0.7rem;color:var(--text3)">${mC+sC} giorni · ${oC} libero${sunFree?' (domenica)':''}</div>
      </div>
      <div class="day-strip">`;
    DAYS.forEach((day,d)=>{
      const code=sh[d];const dt=new Date(ws);dt.setDate(ws.getDate()+d);
      const cls=code==='O'&&d===6?'OFF-SUN':(code||'OFF');
      h+=`<div class="day-box">
        <div class="day-name" style="${d===5?'color:var(--sat)':d===6?'color:var(--amber)':''}">${day}</div>
        <div class="day-date">${fmt2(dt)}</div>
        <div class="day-shift ${cls}">${pillShort(code)}</div>
        <div class="day-time">${SL[code]||''}</div>
      </div>`;
    });
    h+=`</div></div>`;
  });

  document.getElementById('main').innerHTML=h;
  attachWeekNav(()=>weekOff,v=>{weekOff=v;},render);
}
window.addEventListener('fb-ready', function() {
  fbInit(()=>{ markFbReady(); render(); });
}, { once: true });
</script>
</body>
</html>
