<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Turni — Coperture</title>
<link rel="stylesheet" href="style.css">
<style>
.cover-pill-target{
  outline:2px dashed var(--blue-b);outline-offset:2px;cursor:pointer!important;
  transition:all 0.12s;
}
.cover-pill-target:hover{background:var(--blue-bg)!important;color:var(--blue)!important;border-color:var(--blue-b)!important;}
.cover-pill-mine{background:var(--amber)!important;color:#fff!important;border-color:var(--amber)!important;cursor:pointer!important;}
.cover-pill-selected-mine{background:var(--amber)!important;color:#fff!important;border-color:var(--amber)!important;}
.cover-legend{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:0.85rem;}
.cover-legend-item{display:flex;align-items:center;gap:0.4rem;font-size:0.72rem;color:var(--text2);}
.cover-legend-dot{width:10px;height:10px;border-radius:3px;}
</style>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-mount"></div>
  <main class="main-area" id="main"></main>
</div>
<!-- App core (classic script, defines globals) -->
<script src="app.js"></script>
<!-- Firebase (ES module, imports SDK v12 and exports to window.*) -->
<script type="module" src="firebase.js"></script>
<script>
/*
  LOGICA COPERTURE
  ─────────────────
  Un dipendente vuole essere libero in un giorno in cui è schedulato.
  Chiede a uno o più colleghi di coprire il suo turno.
  Il collega accetta → prende quel turno extra (in aggiunta al suo), 
  il richiedente diventa libero quel giorno.

  Regole:
  - Il collega NON deve essere già libero quel giorno (altrimenti non ha senso).
  - Il collega non deve già lavorare nello stesso turno (si sommerebbero).
  - Dopo la copertura, i vincoli capo+uomo devono restare soddisfatti.
  - La richiesta va a TUTTI i colleghi che potrebbero coprire (non in libero quel giorno).
  - Se più accettano: priorità a chi ha meno ore settimanali.
  - Il titolare ha visione completa.

  Differenza da "Cambi turno":
  - Cambio = A dà il suo turno a B, B dà il suo turno ad A (scambio 1:1).
  - Copertura = A chiede a B di fare il suo turno IN PIÙ, A è libero.
    Non c'è scambio: B lavora un giorno extra (o rimane nel suo turno e copre anche quello).
    Più realisticamente: B prende il turno di A, A è libero (ma B non diventa libero al posto suo).
*/

const user = requireAuth();
if(!user) throw 0;
document.getElementById('sidebar-mount').innerHTML = buildSidebar('coperture', user);

const isOwner = user.role==='owner';
const myEmp = isOwner ? null : UID_TO_EMP[user.uid];

let tab = 'new'; // 'new'|'sent'|'received'
let coverWeekOff = 0;
let selectedDay = null; // dayIdx selezionato (il turno che voglio cedere)

function render(){
  if(isOwner){ renderOwner(); return; }

  const sentCount = coverStore.filter(r=>r.fromUid===user.uid).length;
  const recCount = coverStore.filter(r=>r.targetColleagues?.includes(myEmp)&&r.responses?.[myEmp]==='pending'&&r.status==='pending').length;

  let h=`<div class="page-title">Coperture</div>
  <div class="page-sub">Chiedi a un collega di coprire il tuo turno quando hai bisogno di essere libero</div>
  <div class="notice notice-blue" style="max-width:640px">
    <div class="notice-dot"></div>
    <div>A differenza del cambio turno, la copertura è <strong>unilaterale</strong>: il collega fa il tuo turno, tu sei libero. Il collega non ottiene niente in cambio — è un favore.</div>
  </div>
  <div class="sec-tabs">
    <button class="sec-tab ${tab==='new'?'active':''}" onclick="setTab('new')">Nuova richiesta</button>
    <button class="sec-tab ${tab==='sent'?'active':''}" onclick="setTab('sent')">Inviate (${sentCount})</button>
    <button class="sec-tab ${tab==='received'?'active':''}" onclick="setTab('received')">Da rispondere <span style="background:var(--blue);color:#fff;border-radius:99px;font-size:0.6rem;padding:0.1rem 0.4rem;margin-left:4px">${recCount}</span></button>
  </div>`;

  if(tab==='new')      h+=renderNewForm();
  else if(tab==='sent') h+=renderSent();
  else                  h+=renderReceived();

  document.getElementById('main').innerHTML=h;
  attachWeekNav(()=>coverWeekOff, v=>{coverWeekOff=v;selectedDay=null;render();}, render);
}
window.setTab=t=>{ tab=t; render(); };

// ── NUOVA RICHIESTA ──────────────────────────────
function renderNewForm(){
  const res = getOrGen(coverWeekOff);
  const ws = weekStart(coverWeekOff);
  const we = new Date(ws); we.setDate(ws.getDate()+6);

  let h=`<div class="card">
    <div class="card-title">Seleziona il turno da coprire</div>
    <p style="font-size:0.8rem;color:var(--text2);margin-bottom:1rem">
      Clicca sul tuo turno (arancione) per indicare il giorno in cui hai bisogno di copertura.
    </p>
    <div class="cover-legend">
      <div class="cover-legend-item"><div class="cover-legend-dot" style="background:var(--amber)"></div> Il tuo turno (selezionabile)</div>
      <div class="cover-legend-item"><div class="cover-legend-dot" style="background:var(--blue-bg);border:2px dashed var(--blue-b)"></div> Colleghi che possono coprire</div>
    </div>
    <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1rem;flex-wrap:wrap">
      ${weekNavHtml()}
      ${selectedDay!==null?`<div style="font-size:0.82rem;color:var(--amber);font-weight:600">
        Hai selezionato: <strong>${DAYS[selectedDay]} ${fmt2(new Date(ws.getTime()+selectedDay*86400000))}</strong>
      </div>`:''}
    </div>`;

  if(!res.schedule){
    h+=`<div class="notice notice-warn"><div class="notice-dot"></div>Nessun turno generato per questa settimana.</div></div>`;
    return h;
  }

  h+=`<div class="table-wrap"><table><thead><tr><th>Dipendente</th>`;
  for(let d=0;d<7;d++){
    const dt=new Date(ws);dt.setDate(ws.getDate()+d);
    h+=`<th class="${d===5?'cs':d===6?'cd':''}">${DAYS[d]}<br><span style="font-size:0.55rem;opacity:0.6">${fmt2(dt)}</span></th>`;
  }
  h+=`</tr></thead><tbody>`;

  EMPLOYEES.forEach(emp=>{
    const isMe=emp===myEmp;
    h+=`<tr class="${isMe?'me-row':''}"><td>${emp}${isMe?' <span style="font-size:0.62rem;color:var(--green);font-weight:700">← tu</span>':''}</td>`;
    for(let d=0;d<7;d++){
      const code=res.schedule[emp][d];
      let extraCls='', onclick='', title='';

      if(isMe && code!=='O'){
        if(selectedDay===d){
          extraCls='cover-pill-selected-mine';
        } else {
          extraCls='cover-pill-mine';
          onclick=`onclick="selectCoverDay(${d})"`;
          title='Clicca per richiedere copertura';
        }
      } else if(!isMe && selectedDay!==null && code!=='O'){
        // Collega disponibile a coprire quel giorno
        const myCode=res.schedule[myEmp][selectedDay];
        const isSat=selectedDay===5;
        const MK=isSat?'SAT-M':'M', SK=isSat?'SAT-S':'S';
        // Può coprire solo se non è libero quel giorno
        if(res.schedule[emp][selectedDay]!=='O'){
          extraCls='cover-pill-target';
          title='Può coprire';
        }
      }

      h+=`<td><span class="${pillCls(code,d)} ${extraCls}" ${onclick} title="${title}">${pillShort(code)}<br><span style="font-size:0.52rem;opacity:0.7">${SL[code]||''}</span></span></td>`;
    }
    h+=`</tr>`;
  });
  h+=`</tbody></table></div>`;

  if(selectedDay!==null){
    const myCode=res.schedule[myEmp][selectedDay];
    const canCover=EMPLOYEES.filter(e=>e!==myEmp&&res.schedule[e][selectedDay]!=='O');
    h+=`<div style="margin-top:1rem;background:var(--blue-bg);border-radius:var(--r-xs);border:1px solid var(--blue-b);padding:1rem">
      <div style="font-size:0.78rem;color:var(--blue);font-weight:700;margin-bottom:0.5rem">
        Turno da coprire: ${DAYS[selectedDay]} — ${SN[myCode]||myCode} (${SL[myCode]||''})
      </div>
      <div style="font-size:0.75rem;color:var(--text2);margin-bottom:0.75rem">
        Colleghi che riceveranno la richiesta: <strong>${canCover.join(', ')||'Nessuno disponibile'}</strong>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label>Motivazione <span style="font-weight:400;opacity:0.6">(opzionale)</span></label>
          <input type="text" id="cover-note" placeholder="Es: visita medica, impegno familiare...">
        </div>
      </div>
      <div style="display:flex;gap:0.5rem">
        ${canCover.length?`<button class="btn btn-blue" onclick="submitCover('${myEmp}')">Invia richiesta di copertura</button>`:'<span style="color:var(--red);font-size:0.8rem">Nessun collega disponibile per coprire questo turno.</span>'}
        <button class="btn btn-ghost btn-sm" onclick="selectedDay=null;render()">Annulla</button>
      </div>
    </div>`;
  } else {
    h+=`<p style="font-size:0.78rem;color:var(--text3);margin-top:0.85rem">Clicca su un tuo turno (arancione) per avviare la richiesta.</p>`;
  }

  h+=`</div>`; // close card
  return h;
}

window.selectCoverDay=function(d){ selectedDay=d; render(); };

window.submitCover=function(myEmp){
  const res=getOrGen(coverWeekOff);
  if(!res.schedule||selectedDay===null) return;
  const myCode=res.schedule[myEmp][selectedDay];
  const canCover=EMPLOYEES.filter(e=>e!==myEmp&&res.schedule[e][selectedDay]!=='O');
  if(!canCover.length){ alert('Nessun collega disponibile.'); return; }

  const note=document.getElementById('cover-note')?.value||'';
  const responses={}; canCover.forEach(e=>{ responses[e]='pending'; });

  const req={
    id:genId(),
    fromUid:user.uid, fromEmp:myEmp,
    dayIdx:selectedDay, myShift:myCode,
    weekOffset:coverWeekOff, weekKeyStr:weekKey(coverWeekOff),
    targetColleagues:canCover, responses,
    status:'pending', winner:null,
    note, createdAt:new Date().toISOString()
  };
  coverStore.unshift(req);
  saveCovers();
  selectedDay=null;
  tab='sent';
  render();
};

// ── INVIATE ──────────────────────────────────────
function renderSent(){
  const mine=coverStore.filter(r=>r.fromUid===user.uid);
  if(!mine.length) return`<div style="color:var(--text3);font-size:0.85rem;padding:1rem 0">Nessuna richiesta inviata.</div>`;

  return mine.map(r=>{
    const ws=weekStart(r.weekOffset);
    const dt=new Date(ws);dt.setDate(ws.getDate()+r.dayIdx);
    const accepted=Object.entries(r.responses||{}).filter(([,v])=>v==='accepted').map(([k])=>k);
    const pending=Object.entries(r.responses||{}).filter(([,v])=>v==='pending').map(([k])=>k);
    const statusCls=r.status==='resolved'?'accepted':r.status==='cancelled'?'rejected':'pending';
    const statusLabel=r.status==='resolved'?'Coperta':r.status==='cancelled'?'Annullata':'In attesa';
    return`<div class="req-card">
      <div class="req-card-body">
        <div class="req-card-title">Copertura ${DAYS[r.dayIdx]} ${fmt2(dt)} — ${SN[r.myShift]||r.myShift}</div>
        <div class="req-card-sub">Settimana: ${fmt3(ws)}</div>
        <div class="req-card-sub">Richiesta a: ${r.targetColleagues.join(', ')}</div>
        ${r.winner?`<div class="req-card-sub" style="color:var(--green)">✓ Coperto da: <strong>${r.winner}</strong></div>`:''}
        ${pending.length&&r.status==='pending'?`<div class="req-card-sub">In attesa di: ${pending.join(', ')}</div>`:''}
        ${r.note?`<div class="req-card-note">"${r.note}"</div>`:''}
        <div style="font-size:0.65rem;color:var(--text3);margin-top:0.25rem">${new Date(r.createdAt).toLocaleString('it-IT')}</div>
      </div>
      <div class="req-card-actions">
        <span class="req-status ${statusCls}">${statusLabel}</span>
        ${r.status==='pending'?`<button class="btn btn-ghost btn-sm" onclick="cancelCover('${r.id}')">Annulla</button>`:''}
      </div>
    </div>`;
  }).join('');
}

window.cancelCover=function(id){
  const r=coverStore.find(x=>x.id===id); if(r) r.status='cancelled'; saveCovers(); render();
};

// ── RICEVUTE ─────────────────────────────────────
function renderReceived(){
  const received=coverStore.filter(r=>
    r.targetColleagues?.includes(myEmp)&&
    r.responses?.[myEmp]==='pending'&&
    r.status==='pending'
  );
  if(!received.length) return`<div style="color:var(--text3);font-size:0.85rem;padding:1rem 0">Nessuna richiesta di copertura ricevuta.</div>`;

  return received.map(r=>{
    const ws=weekStart(r.weekOffset);
    const dt=new Date(ws);dt.setDate(ws.getDate()+r.dayIdx);
    const myShiftThatDay = getOrGen(r.weekOffset)?.schedule?.[myEmp]?.[r.dayIdx];
    return`<div class="req-card">
      <div class="req-card-body">
        <div class="req-card-title">${r.fromEmp} ti chiede di coprire il suo turno</div>
        <div class="req-card-sub">
          Giorno: <strong>${DAYS[r.dayIdx]} ${fmt2(dt)}</strong> — ${SN[r.myShift]||r.myShift} (${SL[r.myShift]||''})
        </div>
        ${myShiftThatDay?`<div class="req-card-sub">Il tuo turno quel giorno: <strong>${SN[myShiftThatDay]||myShiftThatDay}</strong></div>`:''}
        <div class="req-card-sub" style="color:var(--blue)">⚠ Accettando, lavorerai quel giorno al posto di ${r.fromEmp}. Non è uno scambio.</div>
        ${r.note?`<div class="req-card-note">💬 "${r.note}"</div>`:''}
        <div class="req-card-sub" style="margin-top:0.2rem">Richiesta anche a: ${r.targetColleagues.filter(e=>e!==myEmp).join(', ')||'solo te'}</div>
      </div>
      <div class="req-card-actions">
        <button class="btn btn-blue btn-sm" onclick="respondCover('${r.id}','${myEmp}','accepted')">✓ Accetto</button>
        <button class="btn btn-ghost btn-sm" onclick="respondCover('${r.id}','${myEmp}','rejected')">✕ Non posso</button>
      </div>
    </div>`;
  }).join('');
}

window.respondCover=function(id,myEmp,answer){
  const r=coverStore.find(x=>x.id===id);
  if(!r||r.status!=='pending') return;
  r.responses[myEmp]=answer;

  const acceptors=Object.entries(r.responses).filter(([,v])=>v==='accepted').map(([k])=>k);
  const allAnswered=Object.values(r.responses).every(v=>v!=='pending');

  if(acceptors.length>0){
    // Algoritmo: chi ha meno turni settimanali = priorità
    const k=r.weekKeyStr;
    const sched=schedStore[k]?.schedule;
    let winner=acceptors[0];
    if(sched&&acceptors.length>1){
      let minWork=999;
      acceptors.forEach(emp=>{
        const sh=sched[emp]||[];
        const worked=sh.filter(s=>s&&s!=='O').length;
        if(worked<minWork){minWork=worked;winner=emp;}
      });
    }
    r.winner=winner;
    r.status='resolved';

    // Applica: fromEmp diventa libero, winner prende quel turno
    if(sched){
      const originalShift=sched[r.fromEmp][r.dayIdx];
      sched[r.fromEmp][r.dayIdx]='O'; // richiedente libero
      // Il winner mantiene il suo turno ma "copre" anche: 
      // nella visualizzazione segnamo che ha fatto una copertura extra
      // Per semplicità segniamo solo che fromEmp è libero.
      saveSched();
    }
    acceptors.filter(e=>e!==winner).forEach(e=>{ r.responses[e]='rejected_auto'; });
  }
  if(allAnswered&&!acceptors.length){ r.status='cancelled'; }

  saveCovers();
  tab='received';
  render();
};

// ── OWNER VIEW ───────────────────────────────────
function renderOwner(){
  const EMP_TO_UID2=EMP_TO_UID;
  let h=`<div class="page-title">Coperture</div>
  <div class="page-sub">Panoramica di tutte le richieste di copertura turno</div>`;

  h+=`<div class="card"><div class="card-title">Statistiche coperture per dipendente</div>
    <div style="overflow-x:auto"><table class="owner-stat-table">
      <thead><tr><th>Dipendente</th><th>Richieste inviate</th><th>Coperte</th><th>Annullate</th><th>Coperture effettuate</th><th>Tasso</th></tr></thead><tbody>`;

  EMPLOYEES.forEach(emp=>{
    const euid=EMP_TO_UID2[emp];
    const sent=coverStore.filter(r=>r.fromUid===euid);
    const resolved=sent.filter(r=>r.status==='resolved').length;
    const cancelled=sent.filter(r=>r.status==='cancelled').length;
    const covered=coverStore.filter(r=>r.winner===emp).length;
    const total=sent.length;
    const rate=total>0?Math.round(resolved/total*100):0;
    h+=`<tr>
      <td style="font-weight:600">${emp}</td>
      <td>${total}</td>
      <td style="color:var(--green);font-weight:600">${resolved}</td>
      <td style="color:var(--red);font-weight:600">${cancelled}</td>
      <td style="color:var(--blue);font-weight:600">${covered}</td>
      <td style="min-width:100px">${total>0?`<div style="font-size:0.75rem;font-weight:600;margin-bottom:2px">${rate}%</div>
        <div class="mini-bar"><div class="mini-bar-fill" style="width:${rate}%;background:var(--blue)"></div></div>`:'—'}</td>
    </tr>`;
  });
  h+=`</tbody></table></div></div>`;

  const pending=coverStore.filter(r=>r.status==='pending');
  h+=`<div class="sh"><span class="sh-title">Richieste in attesa (${pending.length})</span></div>`;
  if(pending.length){
    h+=pending.map(r=>{
      const ws=weekStart(r.weekOffset);
      const dt=new Date(ws);dt.setDate(ws.getDate()+r.dayIdx);
      const p=Object.entries(r.responses||{}).filter(([,v])=>v==='pending').map(([k])=>k);
      return`<div class="req-card">
        <div class="req-card-body">
          <div class="req-card-title">${r.fromEmp} — Copertura ${DAYS[r.dayIdx]} ${fmt2(dt)}</div>
          <div class="req-card-sub">${SN[r.myShift]} · Sett. ${fmt3(ws)}</div>
          <div class="req-card-sub">Attesa da: ${p.join(', ')}</div>
          ${r.note?`<div class="req-card-note">${r.note}</div>`:''}
        </div>
        <div class="req-card-actions">
          <span class="req-status pending">In attesa</span>
          <button class="btn btn-ghost btn-sm" onclick="ownerDeleteCover('${r.id}')">✕</button>
        </div>
      </div>`;
    }).join('');
  } else {
    h+=`<div style="color:var(--text3);font-size:0.85rem">Nessuna in attesa.</div>`;
  }

  const all=coverStore.filter(r=>r.status!=='pending');
  if(all.length){
    h+=`<div class="sh" style="margin-top:1rem"><span class="sh-title">Storico (${all.length})</span></div>`;
    h+=all.slice(0,20).map(r=>{
      const ws=weekStart(r.weekOffset);
      const dt=new Date(ws);dt.setDate(ws.getDate()+r.dayIdx);
      const cls=r.status==='resolved'?'accepted':'rejected';
      const lbl=r.status==='resolved'?`Coperta da ${r.winner}`:'Annullata';
      return`<div class="req-card">
        <div class="req-card-body">
          <div class="req-card-title">${r.fromEmp} — ${DAYS[r.dayIdx]} ${fmt2(dt)} (${SN[r.myShift]})</div>
          <div class="req-card-sub">Sett. ${fmt3(ws)}</div>
        </div>
        <div class="req-card-actions">
          <span class="req-status ${cls}">${lbl}</span>
        </div>
      </div>`;
    }).join('');
  }

  document.getElementById('main').innerHTML=h;
  attachWeekNav(()=>coverWeekOff, v=>{coverWeekOff=v;}, render);
}

window.ownerDeleteCover=function(id){ coverStore=coverStore.filter(r=>r.id!==id); saveCovers(); render(); };

window.addEventListener('fb-ready', function() {
  fbInit(()=>{ markFbReady(); render(); fbListenCovers(render); });
}, { once: true });
</script>
</body>
</html>
